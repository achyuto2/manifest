apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: swiggy
  template:
    metadata:
      labels:
        app: swiggy
    spec:
      containers:
        - name: cont-1
          image: nginx
          ports:
#            - continerPort: 80
          volumeMounts:
            - mountPath: "/tmp/volumes"
              name: volume1
        - name: cont-2
          image: ubuntu
          command: ["/bin/bash", "-c","while true; do echo welcome; sleep 10; done"]
      volumes:
        - name: volume1
          emptyDir: {}
